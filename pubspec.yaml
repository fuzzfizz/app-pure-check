name: pure_check
description: AI-powered cosmetic ingredient analyzer for Thai users
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # AI
  google_generative_ai: ^0.4.6

  # Barcode scanner
  mobile_scanner: ^6.0.5

  # HTTP
  http: ^1.2.2

  # UI
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # Config
  flutter_dotenv: ^5.2.1

  # Utils
  shared_preferences: ^2.3.3
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
  generate: true
